# Auri — database configuration for Alembic.

[alembic]
# Path to the Alembic migration scripts directory.
script_location = alembic

# SQLAlchemy URL for the **synchronous** driver (Alembic offline).
# The async driver (asyncpg) is configured in env.py.
sqlalchemy.url = postgresql://auri:@localhost:5432/auri

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
