name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Lint — code quality & type checking
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r backend/requirements.txt -r bot/requirements.txt

      - name: Ruff lint
        run: ruff check backend/ bot/

      - name: Ruff format check
        run: ruff format --check backend/ bot/

      - name: Mypy type check
        run: mypy backend/ bot/ --ignore-missing-imports

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install Node dependencies
        working-directory: mobile
        run: npm ci

      - name: ESLint
        working-directory: mobile
        run: npx eslint . --ext .ts,.tsx

      - name: TypeScript type check
        working-directory: mobile
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Test — unit & integration
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auri
          POSTGRES_PASSWORD: auri
          POSTGRES_DB: auri_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auri"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov httpx aiosqlite
          pip install -r backend/requirements.txt -r bot/requirements.txt

      - name: Run Python tests
        run: pytest backend/ bot/ -v --cov=backend --cov=bot --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://auri:auri@localhost:5432/auri_test
          ENVIRONMENT: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install Node dependencies
        working-directory: mobile
        run: npm ci

      - name: Run vitest
        working-directory: mobile
        # --coverage needs @vitest/coverage-v8; add it back when mobile tests exist.
        run: npx vitest run --passWithNoTests

  # ---------------------------------------------------------------------------
  # Build — Docker image build verification
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

  # ---------------------------------------------------------------------------
  # Security — vulnerability scanning
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"

      - name: Upload Trivy results to GitHub Security
        # Code-scanning API is unavailable on private repos without Advanced
        # Security; the scan itself (previous step) remains the gate.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"
